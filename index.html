<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Universe Atlas — from quark to cosmos, to true scale</title>
    <!-- What a shared link unfurls into. The card image is a real frame:
         a headless capture of the actual renderer, not an illustration. -->
    <meta
      name="description"
      content="A true-scale atlas of the universe in your browser: scroll from the observable universe to a proton through 6.8 million real stars, real planets on real orbits, and a picnic blanket in Chicago. Every size, distance, and speed is real."
    />
    <link rel="canonical" href="https://universeatlas.org/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Universe Atlas" />
    <meta property="og:title" content="Universe Atlas — from quark to cosmos, to true scale" />
    <meta
      property="og:description"
      content="Scroll through 43 orders of magnitude: the cosmic web, 6.8 million measured stars, planets on their real orbits, eclipses where they really land — down to a picnic blanket, and inward to the quarks."
    />
    <meta property="og:url" content="https://universeatlas.org/" />
    <meta property="og:image" content="https://universeatlas.org/social-card.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Universe Atlas — from quark to cosmos, to true scale" />
    <meta
      name="twitter:description"
      content="A true-scale WebGPU atlas of the universe: 43 orders of magnitude, every one of them real."
    />
    <meta name="twitter:image" content="https://universeatlas.org/social-card.jpg" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #gpu {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        cursor: grab;
      }
      #gpu.dragging {
        cursor: grabbing;
      }
      /* Photo mode (H): every overlay yields to the frame itself. */
      body.photo .hud,
      body.photo #search,
      body.photo #sky-labels,
      body.photo #seam {
        display: none !important;
      }
      .hud,
      .hud button,
      #search,
      #search input,
      #search li {
        /* No iOS double-tap-to-zoom on controls: a double-tapped HUD button
           zoomed the page and stranded half the UI off-screen. Pinch zoom
           elsewhere stays available for accessibility. */
        touch-action: manipulation;
      }
      .hud {
        position: fixed;
        font-family: 'SF Mono', ui-monospace, Menlo, monospace;
        color: #cfd8e6;
        user-select: none;
        pointer-events: none;
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 0.75),
          0 0 12px rgba(0, 0, 0, 0.35); /* readable over the white blanket cells */
      }
      #title {
        top: 18px;
        left: 22px;
      }
      #title h1 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5em;
        color: #e8eef8;
      }
      #title p {
        font-size: 10px;
        letter-spacing: 0.18em;
        color: #6d7a8f;
        margin-top: 5px;
      }
      #scale {
        bottom: 74px;
        left: 22px;
      }
      #scale .width {
        font-size: 22px;
        color: #ffffff;
        font-weight: 500;
      }
      #scale .exp {
        font-size: 11px;
        color: #8494ab;
        margin-top: 3px;
        letter-spacing: 0.08em;
      }
      #scale .ctx {
        font-size: 10px;
        color: #5f96d8;
        margin-top: 6px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }
      #scale .time {
        font-size: 10px;
        color: #6d7a8f;
        margin-top: 8px;
        letter-spacing: 0.1em;
      }
      #scale .timectl {
        margin-top: 6px;
        display: flex;
        gap: 5px;
        pointer-events: auto;
      }
      #scale .timectl button {
        font-family: inherit;
        font-size: 11px;
        line-height: 1;
        width: 30px;
        padding: 6px 0;
        background: rgba(20, 28, 42, 0.72);
        color: #aebdd2;
        border: 1px solid rgba(110, 140, 190, 0.25);
        border-radius: 4px;
        cursor: pointer;
      }
      #scale .timectl button:hover {
        color: #fff;
      }
      #focus {
        top: 18px;
        right: 22px;
        text-align: right;
      }
      #focus .name {
        font-size: 13px;
        color: #e8eef8;
        letter-spacing: 0.15em;
      }
      #focus .src {
        font-size: 9px;
        color: #7d8ba1;
        margin-top: 4px;
        letter-spacing: 0.12em;
      }
      /* Constellation name labels, projected onto the sky each frame. */
      #sky-labels {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        display: none;
      }
      #sky-labels span {
        position: absolute;
        left: 0;
        top: 0;
        font-size: 9px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(126, 158, 214, 0.6);
        white-space: nowrap;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
      }
      #seam {
        top: calc(64px + env(safe-area-inset-top, 0px));
        left: 50%;
        transform: translateX(-50%);
        display: none;
        font-size: 10px;
        letter-spacing: 0.12em;
        color: #8494ab;
        background: rgba(14, 20, 32, 0.75);
        border: 1px solid rgba(110, 140, 190, 0.25);
        border-radius: 5px;
        padding: 7px 12px;
        backdrop-filter: blur(6px);
        text-align: center;
        max-width: min(640px, calc(100vw - 260px));
      }
      #seam .m {
        color: #e8eef8;
      }
      #seam .a {
        color: #f0b45f;
      }
      #seam .i {
        color: #5fd4f0;
      }
      #focus .hint {
        font-size: 10px;
        color: #6d7a8f;
        margin-top: 5px;
        letter-spacing: 0.1em;
      }
      #targets {
        bottom: calc(20px + env(safe-area-inset-bottom, 0px));
        left: 22px;
        right: 22px;
        display: flex;
        gap: 6px;
        align-items: stretch;
        pointer-events: auto;
      }
      #targets .scroller {
        display: flex;
        gap: 6px;
        flex: 1;
        min-width: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      #targets .scroller::-webkit-scrollbar {
        display: none;
      }
      #targets button {
        white-space: nowrap;
        flex-shrink: 0;
      }
      #targets button {
        font-family: inherit;
        font-size: 10px;
        letter-spacing: 0.12em;
        padding: 7px 12px;
        background: rgba(20, 28, 42, 0.72);
        color: #aebdd2;
        border: 1px solid rgba(110, 140, 190, 0.25);
        border-radius: 4px;
        cursor: pointer;
        backdrop-filter: blur(6px);
      }
      #targets button:hover {
        background: rgba(38, 52, 76, 0.85);
        color: #fff;
      }
      #targets button.active {
        border-color: #5f96d8;
        color: #cfe4ff;
      }
      #targets button.tour {
        margin-left: auto;
        border-color: rgba(200, 160, 90, 0.45);
        color: #e8c890;
      }
      #fatal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: #05070c;
        color: #cfd8e6;
        font-family: ui-monospace, monospace;
        font-size: 13px;
        text-align: center;
        line-height: 1.8;
        padding: 40px;
      }
      #search {
        position: fixed;
        top: 18%;
        left: 50%;
        transform: translateX(-50%);
        width: min(420px, calc(100vw - 40px));
        display: none;
        flex-direction: column;
        gap: 4px;
        font-family: 'SF Mono', ui-monospace, Menlo, monospace;
        z-index: 10;
      }
      #search input {
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.08em;
        padding: 12px 14px;
        background: rgba(14, 20, 32, 0.92);
        color: #e8eef8;
        border: 1px solid rgba(110, 140, 190, 0.45);
        border-radius: 6px;
        outline: none;
        backdrop-filter: blur(8px);
      }
      #search ul {
        list-style: none;
        background: rgba(14, 20, 32, 0.92);
        border: 1px solid rgba(110, 140, 190, 0.25);
        border-radius: 6px;
        overflow: hidden;
        backdrop-filter: blur(8px);
      }
      #search li {
        padding: 9px 14px;
        font-size: 11px;
        letter-spacing: 0.12em;
        color: #aebdd2;
        cursor: pointer;
      }
      #search li.sel {
        background: rgba(95, 150, 216, 0.25);
        color: #ffffff;
      }
      /* Small screens: tighter type, no hint line, scrolling button bar. */
      @media (max-width: 760px) {
        /* At least 16px or iOS zooms the whole page in on focus — and the
           zoom outlives the keyboard, stranding the bottom bar off-screen. */
        #search input {
          font-size: 16px;
        }
        #title {
          top: calc(10px + env(safe-area-inset-top, 0px));
          left: 14px;
        }
        #title h1 {
          font-size: 12px;
        }
        #title p {
          font-size: 8px;
        }
        #focus {
          top: calc(10px + env(safe-area-inset-top, 0px));
          right: 14px;
          max-width: 46vw;
        }
        #focus .name {
          font-size: 10px;
        }
        #focus .src {
          font-size: 9px;
          color: #7d8ba1;
          margin-top: 4px;
          letter-spacing: 0.12em;
        }
        #seam {
          top: calc(64px + env(safe-area-inset-top, 0px));
          left: 50%;
          transform: translateX(-50%);
          display: none;
          font-size: 10px;
          letter-spacing: 0.12em;
          color: #8494ab;
          background: rgba(14, 20, 32, 0.75);
          border: 1px solid rgba(110, 140, 190, 0.25);
          border-radius: 5px;
          padding: 7px 12px;
          backdrop-filter: blur(6px);
          text-align: center;
          max-width: min(640px, calc(100vw - 260px));
        }
        #seam .m {
          color: #e8eef8;
        }
        #seam .a {
          color: #f0b45f;
        }
        #seam .i {
          color: #5fd4f0;
        }
        #focus .hint {
          display: none;
        }
        #scale {
          left: 14px;
          bottom: calc(64px + env(safe-area-inset-bottom, 0px));
        }
        #scale .width {
          font-size: 17px;
        }
        #scale .exp {
          font-size: 9px;
        }
        #targets {
          left: 14px;
          right: 14px;
          bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        }
        #targets button {
          font-size: 9px;
          padding: 6px 9px;
        }
        #targets button.tour {
          margin-left: 0;
        }
      }
      /* The first-visit nudge: a visitor lands at the observable universe
         with no cue that the whole atlas is one scroll away. One line,
         gone forever on the first gesture (see the inline script below). */
      #welcome {
        position: fixed;
        left: 50%;
        top: 62%;
        transform: translateX(-50%);
        font-family: 'SF Mono', ui-monospace, Menlo, monospace;
        color: #cfd8e6;
        text-align: center;
        user-select: none;
        pointer-events: none;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
        letter-spacing: 0.14em;
        font-size: 13px;
        animation: welcome-breathe 2.6s ease-in-out infinite;
        transition: opacity 0.6s;
      }
      #welcome .sub {
        margin-top: 8px;
        font-size: 10px;
        letter-spacing: 0.12em;
        color: #8fa1b8;
      }
      @keyframes welcome-breathe {
        0%,
        100% {
          opacity: 0.95;
        }
        50% {
          opacity: 0.45;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="gpu"></canvas>
    <div class="hud" id="title">
      <h1>UNIVERSE ATLAS</h1>
      <p>FROM QUARK TO COSMOS · 10²⁷ → 10⁻¹⁶ M</p>
    </div>
    <div class="hud" id="scale">
      <div class="width">—</div>
      <div class="exp">—</div>
      <div class="ctx">—</div>
      <div class="time">—</div>
      <div class="timectl">
        <button data-t="slower" title="slower ( [ )">−</button>
        <button data-t="pause" title="pause ( P )">⏸</button>
        <button data-t="faster" title="faster ( ] )">+</button>
      </div>
    </div>
    <div class="hud" id="focus">
      <div class="name">—</div>
      <div class="src">—</div>
      <div class="hint">
        click focus · 2×click fly · drag orbit · scroll zoom · [ ] time · P pause · X seam · C constellations · T tour ·
        H overlay · S photo
      </div>
    </div>
    <div class="hud" id="seam">
      THE HONEST SEAM — <span class="m">natural: measured</span> ·
      <span class="a">amber: real size, stylized look</span> ·
      <span class="i">cyan: illustrative</span>
    </div>
    <div class="hud" id="targets"></div>
    <div id="search">
      <input type="text" placeholder="search the universe — try “arcturus”" autocomplete="off" spellcheck="false" />
      <ul></ul>
    </div>
    <div id="fatal"></div>
    <script>
      // First-visit nudge: only on a bare load (a shared ?goto link speaks
      // for itself), only once per browser, and gone on the first gesture —
      // any scroll, touch, key, or click means the visitor is already flying.
      (() => {
        let seen = false;
        try {
          seen = localStorage.getItem('atlas-welcomed') === '1';
        } catch {
          /* storage blocked: show it, skip remembering */
        }
        if (location.search !== '' || seen) return;
        const el = document.createElement('div');
        el.id = 'welcome';
        el.innerHTML =
          'SCROLL TO FALL IN — 43 ORDERS OF MAGNITUDE DOWN TO A PICNIC' +
          '<div class="sub">PINCH ON TOUCH · OR PRESS T FOR THE GRAND TOUR</div>';
        document.body.appendChild(el);
        const dismiss = () => {
          try {
            localStorage.setItem('atlas-welcomed', '1');
          } catch {
            /* fine */
          }
          el.style.opacity = '0';
          setTimeout(() => el.remove(), 700);
        };
        for (const ev of ['wheel', 'pointerdown', 'touchstart', 'keydown']) {
          addEventListener(ev, dismiss, { once: true, passive: true });
        }
        setTimeout(dismiss, 45000); // it is a nudge, not a billboard
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
