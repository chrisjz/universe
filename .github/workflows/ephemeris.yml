# Checks our Keplerian planet ephemeris against JPL Horizons ground truth
# (scripts/verify-ephemeris.mjs asserts every planet lands within 0.2° at
# three epochs spanning 2000–2049). Runs when the ephemeris changes, weekly
# against live Horizons on main, and on demand.
name: Ephemeris

on:
  pull_request:
    paths:
      - 'src/ephemeris.ts'
      - 'scripts/verify-ephemeris.mjs'
      - '.github/workflows/ephemeris.yml'
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

jobs:
  horizons:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify against JPL Horizons
        run: node scripts/verify-ephemeris.mjs
